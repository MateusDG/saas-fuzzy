services:
  db:
    image: postgres:16
    container_name: kouzina_reco_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kouzina_reco
    ports:
      - "5432:5432"
    volumes:
      - kouzina_reco_db_data:/var/lib/postgresql/data

volumes:
  kouzina_reco_db_data:

