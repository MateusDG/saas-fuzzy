<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta property="product:retailer_item_id" content="mock-001">
    <title>Kouzina Reco Demo</title>
    <style>
      body {
        margin: 0;
        background: #f5efe4;
        color: #1f1a14;
        font-family: Georgia, "Times New Roman", serif;
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 48px 20px;
      }

      .demo-product {
        border-radius: 22px;
        padding: 32px;
        background: linear-gradient(135deg, #fffaf0, #ead8bb);
        box-shadow: 0 20px 50px rgba(60, 38, 18, 0.12);
      }

      .demo-eyebrow {
        margin: 0 0 10px;
        color: #7a4b17;
        font-size: 13px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(32px, 6vw, 56px);
        line-height: 0.96;
      }

      .demo-copy {
        max-width: 640px;
        color: #5d5144;
        font-size: 18px;
        line-height: 1.5;
      }

      .demo-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 20px;
      }

      .demo-meta span {
        border: 1px solid rgba(122, 75, 23, 0.24);
        border-radius: 999px;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.55);
        color: #4d3825;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <article class="demo-product" data-kouzina-product-id="mock-001">
        <p class="demo-eyebrow">Produto demonstrativo</p>
        <h1>Cooktop premium compativel 220V</h1>
        <p class="demo-copy">
          Pagina local para validar o widget Kouzina Reco com ranking v0 real
          usando o catalogo importado do seed.
        </p>
        <div class="demo-meta" aria-label="Dados do produto">
          <span>Codigo: mock-001</span>
          <span>Tipo: Cooktop</span>
          <span>Ambiente: Cozinha Gourmet</span>
          <span>Voltagem: 220V</span>
        </div>
      </article>

      <div data-kouzina-reco="product-page"></div>
    </main>

    <script>
      window.KouzinaReco = {
        apiBaseUrl: "http://localhost:8000",
        publicKey: "kouzina_public_dev_key"
      };
    </script>
    <script async src="./kouzina-reco.js"></script>
  </body>
</html>
